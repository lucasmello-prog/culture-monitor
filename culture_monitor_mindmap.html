<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --yellow:#EBFF00; --black:#0D0D0D; --mid:#6B6B6B; --light:#E4E4E0; --bg:#FFFFFF; --panel-w:340px; }
html,body { height:100%; background:var(--bg); font-family:'EB Garamond',Georgia,serif; color:var(--black); overflow:hidden; }
.app { display:grid; grid-template-columns:1fr var(--panel-w); grid-template-rows:auto 1fr; height:100vh; }

header { grid-column:1/3; display:flex; align-items:center; justify-content:space-between; padding:14px 32px; border-bottom:1px solid var(--black); flex-shrink:0; }
.logo { font-size:13px; font-style:italic; color:var(--mid); }
.hc { display:flex; align-items:baseline; gap:18px; }
.ht { font-size:19px; font-weight:700; letter-spacing:-0.02em; }
.hs { font-size:13px; color:var(--mid); font-style:italic; }
.stats { display:flex; }
.stat { display:flex; flex-direction:column; align-items:center; padding:0 16px; border-left:1px solid var(--light); }
.stat:first-child { border-left:none; }
.sn { font-family:'DM Mono',monospace; font-size:15px; line-height:1; }
.sl { font-family:'DM Mono',monospace; font-size:8px; color:var(--mid); text-transform:uppercase; letter-spacing:.12em; margin-top:3px; }

.map-area { grid-column:1; grid-row:2; position:relative; overflow:hidden; }
canvas { display:block; width:100%; height:100%; }
.map-hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.16em; color:#C8C8C4; pointer-events:none; transition:opacity .4s; white-space:nowrap; }
.map-hint.hidden { opacity:0; }
.nav-page{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mid);text-decoration:none;padding:7px 14px;border:1px solid var(--light);transition:all .15s;cursor:pointer;background:none;white-space:nowrap}
.nav-page:hover{border-color:var(--black);color:var(--black);background:var(--yellow)}

.panel { grid-column:2; grid-row:2; border-left:1px solid var(--black); display:flex; flex-direction:column; background:var(--bg); overflow:hidden; position:relative; }
.panel-empty { display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; height:100%; padding:28px 26px; }
.pe-label { font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--light); margin-bottom:10px; }
.pe-text { font-size:15px; color:var(--light); font-style:italic; line-height:1.5; max-width:200px; }

.view-topics,.view-keywords { display:none; flex-direction:column; height:100%; }
.view-topics.active,.view-keywords.active { display:flex; }

.ph { padding:18px 26px 14px; border-bottom:1px solid var(--light); flex-shrink:0; position:relative; }
.ph-tag { font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--mid); margin-bottom:7px; }
.ph-name { font-size:18px; font-weight:700; letter-spacing:-0.02em; line-height:1.2; margin-bottom:10px; }
.ph-meta { display:flex; align-items:center; gap:8px; }
.badge { background:var(--yellow); color:var(--black); font-family:'DM Mono',monospace; font-size:11px; font-weight:500; padding:3px 9px; }
.badge-text { font-size:13px; color:var(--mid); font-style:italic; }
.close-btn { position:absolute; top:16px; right:22px; background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:18px; color:var(--light); transition:color .15s; padding:0; line-height:1; }
.close-btn:hover { color:var(--black); }

.back-btn { display:flex; align-items:center; gap:8px; padding:11px 26px; border-bottom:1px solid var(--light); background:none; border-left:none; border-right:none; border-top:none; width:100%; cursor:pointer; font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:var(--mid); transition:all .15s; flex-shrink:0; text-align:left; }
.back-btn:hover { background:#FAFAF8; color:var(--black); }
.back-btn span { font-size:13px; }

.panel-body { flex:1; overflow-y:auto; }
.panel-body::-webkit-scrollbar { width:3px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--light); }

.topic-row { display:flex; align-items:baseline; gap:14px; padding:11px 26px; border-bottom:1px solid var(--light); cursor:pointer; transition:background .1s; }
.topic-row:hover { background:#F7F7F5; }
.topic-row:hover .topic-arr { opacity:1; }
.topic-row:last-child { border-bottom:none; }
.t-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--light); min-width:22px; flex-shrink:0; }
.t-name { font-size:14px; color:var(--black); line-height:1.3; flex:1; }
.topic-arr { font-size:12px; color:var(--mid); opacity:0; transition:opacity .15s; flex-shrink:0; }

.kw-topic-name { font-size:12px; color:var(--mid); font-style:italic; margin-top:4px; line-height:1.3; }
.kw-body { flex:1; overflow-y:auto; padding:18px 26px; display:flex; flex-wrap:wrap; align-content:flex-start; gap:7px; }
.kw-body::-webkit-scrollbar { width:3px; }
.kw-body::-webkit-scrollbar-thumb { background:var(--light); }
.kw-chip { font-family:'DM Mono',monospace; font-size:10px; padding:5px 10px; border:1px solid var(--light); color:var(--black); background:var(--bg); letter-spacing:.02em; line-height:1.4; transition:all .12s; cursor:default; }
.kw-chip:hover { border-color:var(--black); background:var(--black); color:var(--yellow); }
.kw-empty { font-size:14px; color:var(--light); font-style:italic; padding:20px 0; }

.panel-nav { border-top:1px solid var(--light); display:flex; flex-shrink:0; }
.nav-btn { flex:1; background:none; border:none; border-right:1px solid var(--light); font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--mid); padding:12px 0; cursor:pointer; transition:all .15s; }
.nav-btn:last-child { border-right:none; }
.nav-btn:hover { background:var(--yellow); color:var(--black); }
</style>
</head>

      <div class="panel-nav">

        <button class="nav-btn" id="navNext">próximo →</button>
      </div>
    </div>
    <div class="view-keywords" id="viewKeywords">

        <div class="ph-name" id="kName"></div>
        <div class="kw-topic-name" id="kTerritory"></div>

      <button class="back-btn" id="backBtn"><span>←</span> voltar para tópicos</button>
      <div class="kw-body" id="kwBody"></div>
    </div>
  </aside>
</div>

const N = 16;

// Two-ring layout computed offline — 0 collisions, all in-bounds
// Inner ring (r~170): indices 1,0,12,5,10,13,14,2
// Outer ring (r~280): indices 11,8,6,4,15,3,7,9
// Pre-computed angles (radians) and orbit radii per node
const NODE_ANGLES = [-0.7854,-1.5708,3.9270,2.7489,1.1781,0.7854,0.3927,3.5343,-0.3927,4.3197,1.5708,-1.1781,0.0000,2.3562,3.1416,1.9635];
const NODE_ORBITS = [170,170,170,280,280,170,280,280,280,280,170,280,170,170,170,280];

// Node pixel radius (computed from text metrics, smaller font for projector clarity)
const NODE_RADII = [44,39,57,65,63,56,61,65,60,68,56,58,50,56,56,63];

const CHAR_W = 6.0, LINE_H = 13, MAX_TW = 100;

const mapArea = document.getElementById('mapArea');
const C = document.getElementById('mm');
const CTX = C.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let W, H, cx, cy, SCALE;
let selected = null, hovered = null;

function nodePos(i) {
  const a = NODE_ANGLES[i];
  const or = NODE_ORBITS[i] * SCALE;
  return { x: cx + or * Math.cos(a), y: cy + or * Math.sin(a) };
}

function nodeR(i) { return Math.round(NODE_RADII[i] * SCALE); }

function wrapWords(name, maxW) {
  const words = name.split(' ');
  const lines = []; let line = '';
  for (const w of words) {
    const t = line ? line + ' ' + w : w;
    if (CTX.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines;
}

function resize() {
  W = mapArea.clientWidth; H = mapArea.clientHeight;
  C.width = W * DPR; C.height = H * DPR;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  CTX.scale(DPR, DPR);
  // scale so layout computed at 940x660 fits the actual canvas
  SCALE = Math.min(W / 940, H / 660) * 0.98;
  // center with a slight upward offset to give bottom nodes more room
  cx = W / 2;
  cy = H / 2 - H * 0.02;
  draw();
}

function draw() {
  CTX.clearRect(0, 0, W, H);

  // subtle two-ring reference circles (dashed)
  CTX.save();
  CTX.setLineDash([3, 9]);
  CTX.lineWidth = 0.6;

  CTX.strokeStyle = '#EAEAE6';
  CTX.beginPath();
  CTX.arc(cx, cy, 170 * SCALE, 0, Math.PI * 2);
  CTX.stroke();

  CTX.beginPath();
  CTX.arc(cx, cy, 280 * SCALE, 0, Math.PI * 2);
  CTX.stroke();
  CTX.restore();

  // spokes from center to each node
  const CENTER_R = 32 * SCALE;
  DATA.forEach((_, i) => {
    const p = nodePos(i);
    const r = nodeR(i);
    const isSel = selected === i;
    const dx = p.x - cx, dy = p.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const sx = cx + dx * CENTER_R / dist;
    const sy = cy + dy * CENTER_R / dist;
    const ex = p.x - dx * r / dist;
    const ey = p.y - dy * r / dist;
    CTX.beginPath();
    CTX.moveTo(sx, sy);
    CTX.lineTo(ex, ey);
    CTX.strokeStyle = isSel ? '#0D0D0D' : '#E8E8E4';
    CTX.lineWidth = isSel ? 1.2 : 0.5;
    CTX.stroke();
  });

  // nodes
  DATA.forEach((d, i) => {
    const p = nodePos(i);
    const r = nodeR(i);
    const isSel = selected === i;
    const isHov = hovered === i;

    CTX.beginPath();
    CTX.arc(p.x, p.y, r, 0, Math.PI * 2);

    if (isSel) {
      CTX.fillStyle = '#0D0D0D';
      CTX.fill();
      CTX.strokeStyle = '#EBFF00';
      CTX.lineWidth = 2.5;
      CTX.stroke();
    } else if (isHov) {
      CTX.fillStyle = '#1A1A1A';
      CTX.fill();
    } else {
      CTX.fillStyle = '#F8F8F6';
      CTX.fill();
      CTX.strokeStyle = '#D4D4D0';
      CTX.lineWidth = 0.8;
      CTX.stroke();
    }

    // Label
    const fs = Math.max(10, Math.round(11.5 * SCALE));
    const lh = Math.max(12, Math.round(14 * SCALE));
    CTX.font = `${isSel || isHov ? '500' : '400'} ${fs}px 'EB Garamond',serif`;
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.fillStyle = (isSel || isHov) ? '#FFFFFF' : '#0D0D0D';

    const maxTW = r * 1.65;
    const lines = wrapWords(d.name, maxTW);
    const totalH = (lines.length - 1) * lh;
    const startY = p.y - totalH / 2 - 5;
    lines.forEach((ln, li) => CTX.fillText(ln, p.x, startY + li * lh));

    // topic count
    const cfs = Math.max(8, Math.round(9 * SCALE));
    CTX.font = `300 ${cfs}px 'DM Mono',monospace`;
    CTX.fillStyle = isSel ? '#EBFF00' : (isHov ? 'rgba(255,255,255,0.6)' : '#BBBBB8');
    CTX.fillText(d.topics.length + ' tópicos', p.x, p.y + r - 12 * SCALE);
  });

  // center node
  CTX.beginPath();
  CTX.arc(cx, cy, CENTER_R, 0, Math.PI * 2);
  CTX.fillStyle = '#0D0D0D';
  CTX.fill();

  const cfs2 = Math.max(9, Math.round(11 * SCALE));
  CTX.font = `italic ${cfs2}px 'EB Garamond',serif`;
  CTX.fillStyle = '#EBFF00';
  CTX.textAlign = 'center';
  CTX.textBaseline = 'middle';
  CTX.fillText('culture', cx, cy - 6 * SCALE);
  CTX.fillText('monitor', cx, cy + 6 * SCALE);
}

function hitTest(mx, my) {
  for (let i = 0; i < N; i++) {
    const p = nodePos(i);
    const r = nodeR(i);
    if ((mx - p.x) ** 2 + (my - p.y) ** 2 <= r * r) return i;
  }
  return null;
}

C.addEventListener('mousemove', e => {
  const rect = C.getBoundingClientRect();
  const h = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (h !== hovered) { hovered = h; draw(); }
  C.style.cursor = h !== null ? 'pointer' : 'default';
});
C.addEventListener('mouseleave', () => { hovered = null; draw(); });
C.addEventListener('click', e => {
  const rect = C.getBoundingClientRect();
  const h = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (h !== null) openTerritory(h);
});

// Panel
const viewEmpty = document.getElementById('viewEmpty');
const viewTopics = document.getElementById('viewTopics');
const viewKeywords = document.getElementById('viewKeywords');
const hint = document.getElementById('hint');

function showView(v) {
  viewEmpty.style.display = v === 'empty' ? '' : 'none';
  viewTopics.classList.toggle('active', v === 'topics');
  viewKeywords.classList.toggle('active', v === 'keywords');
}

function openTerritory(i) {
  selected = i;
  hint.classList.add('hidden');
  updateNavLink();
  const d = DATA[i];
  document.getElementById('tTag').textContent = 'Território ' + String(i+1).padStart(2,'0') + ' de ' + N;
  document.getElementById('tName').textContent = d.name;
  document.getElementById('tBadge').textContent = d.topics.length;
  const list = document.getElementById('topicList');
  list.innerHTML = d.topics.map((t,ti) =>
    `<div class="topic-row" data-terr="${i}" data-topic="${ti}">
       <span class="t-num">${String(ti+1).padStart(2,'0')}</span>
       <span class="t-name">${t}</span>
       <span class="topic-arr">→</span>
     </div>`
  ).join('');
  list.querySelectorAll('.topic-row').forEach(row => {
    row.addEventListener('click', () => openKeywords(+row.dataset.terr, +row.dataset.topic));
  });
  list.scrollTop = 0;
  showView('topics');
  draw();
}

function openKeywords(ti, ki) {
  const terr = DATA[ti];
  const topicName = terr.topics[ki];
  document.getElementById('kTag').textContent = 'Palavras-chave · tópico ' + String(ki+1).padStart(2,'0');
  document.getElementById('kName').textContent = topicName;
  document.getElementById('kTerritory').textContent = terr.name;
  const terrKw = KW_DATA[terr.name] || {};
  let kws = terrKw[topicName];
  if (!kws) {
    const key = Object.keys(terrKw).find(k => k.slice(0,14) === topicName.slice(0,14));
    kws = key ? terrKw[key] : [];
  }
  const body = document.getElementById('kwBody');
  body.innerHTML = kws && kws.length
    ? kws.map(k => `<span class="kw-chip">${k}</span>`).join('')
    : '<span class="kw-empty">Palavras-chave não mapeadas para este tópico.</span>';
  showView('keywords');
}

document.getElementById('closeTopics').addEventListener('click', () => { selected=null; hint.classList.remove('hidden'); showView('empty'); updateNavLink(); draw(); });
document.getElementById('closeKw').addEventListener('click', () => { selected=null; hint.classList.remove('hidden'); showView('empty'); updateNavLink(); draw(); });
document.getElementById('backBtn').addEventListener('click', () => showView('topics'));
document.getElementById('navPrev').addEventListener('click', () => { if(selected!==null) openTerritory((selected-1+N)%N); });
document.getElementById('navNext').addEventListener('click', () => { if(selected!==null) openTerritory((selected+1)%N); });
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { if(viewKeywords.classList.contains('active')) showView('topics'); else if(viewTopics.classList.contains('active')) { selected=null; hint.classList.remove('hidden'); showView('empty'); draw(); } }
  if(e.key==='ArrowRight' && viewTopics.classList.contains('active') && selected!==null) openTerritory((selected+1)%N);
  if(e.key==='ArrowLeft' && viewTopics.classList.contains('active') && selected!==null) openTerritory((selected-1+N)%N);
});

showView('empty');

// ── Deep-link: open territory from URL hash ──
// e.g. culture_monitor_mindmap.html#Esportes
function openFromHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (!hash) return;
  const idx = DATA.findIndex(d => d.name === hash);
  if (idx !== -1) openTerritory(idx);
}
window.addEventListener('hashchange', openFromHash);

new ResizeObserver(() => resize()).observe(mapArea);
resize();
requestAnimationFrame(() => requestAnimationFrame(openFromHash));

// Keep nav button in sync with selected territory
function updateNavLink() {
  const a = document.getElementById('navToContextos');
  if (!a) return;
  if (selected !== null) {
    const terrName = encodeURIComponent(DATA[selected].name);
    a.href = `culture_monitor_contextos.html#terr-${terrName}`;
    a.title = `Ver contextos de ${DATA[selected].name}`;
  } else {
    a.href = 'culture_monitor_contextos.html';
    a.title = '';
  }
}
</script>
</body>
