<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Monitor — Contextos Ativáveis 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#EBFF00;
  --black:#0D0D0D;
  --mid:#6B6B6B;
  --light:#E4E4E0;
  --lighter:#F4F4F0;
  --bg:#FFFFFF;
  --panel-w:360px;
}
html,body{height:100%;background:var(--bg);font-family:'EB Garamond',Georgia,serif;color:var(--black);overflow:hidden}
.app{display:grid;grid-template-columns:1fr var(--panel-w);grid-template-rows:auto auto auto 1fr;height:100vh}

/* HEADER */
header{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--black);flex-shrink:0}
.logo{font-size:13px;font-style:italic;color:var(--mid)}
.hc{display:flex;align-items:baseline;gap:18px}
.ht{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.hs{font-size:13px;color:var(--mid);font-style:italic}
.stats{display:flex}
.stat{display:flex;flex-direction:column;align-items:center;padding:0 16px;border-left:1px solid var(--light)}
.stat:first-child{border-left:none}
.sn{font-family:'DM Mono',monospace;font-size:15px;line-height:1}
.sl{font-family:'DM Mono',monospace;font-size:8px;color:var(--mid);text-transform:uppercase;letter-spacing:.12em;margin-top:3px}

/* FILTER BAR */
/* ── TERRITORY BAR — 2-row grid, all 16 visible ── */
.terr-bar{
  grid-column:1/3;
  display:flex;
  align-items:stretch;
  border-bottom:1px solid var(--black);
  flex-shrink:0;
}
.terr-bar-label{
  font-family:'DM Mono',monospace;
  font-size:8px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--mid);
  padding:0 18px;
  display:flex;
  align-items:center;
  border-right:1px solid var(--light);
  flex-shrink:0;
  white-space:nowrap;
  writing-mode:horizontal-tb;
}
.terr-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:repeat(3,1fr);
  min-width:0;
}

/* Territory chips — fill cells */
.tchip{
  font-family:'DM Mono',monospace;
  font-size:11px;
  padding:0 12px;
  border:none;
  border-right:1px solid var(--light);
  border-bottom:1px solid var(--light);
  color:var(--mid);
  background:var(--bg);
  cursor:pointer;
  transition:background .15s, color .15s;
  white-space:nowrap;
  letter-spacing:.03em;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.3;
  overflow:hidden;
  text-overflow:ellipsis;
}
/* remove bottom border from last row, right border from last col */
.tchip:nth-child(n+13){ border-bottom:none; }
.tchip:nth-child(6n){ border-right:none; }
.tchip:hover{ background:var(--lighter); color:var(--black); }
.tchip.tactive{ color:#fff; border-color:transparent; }

/* ── SECONDARY FILTER BAR (tipo + escopo + busca) ── */
.filters{
  grid-column:1/3;
  display:flex;
  align-items:center;
  border-bottom:1px solid var(--light);
  flex-shrink:0;
  overflow:hidden;
}
.filter-group{
  display:flex;
  align-items:center;
  gap:6px;
  border-right:1px solid var(--light);
  padding:8px 16px;
  flex-shrink:0;
}
.filter-group:last-child{border-right:none}
.fg-label{
  font-family:'DM Mono',monospace;
  font-size:8px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--mid);
  margin-right:6px;
  white-space:nowrap;
  flex-shrink:0;
}
.filter-chips{display:flex;gap:4px;flex-wrap:nowrap}

/* Base chip (tipo / escopo) */
.chip{
  font-family:'DM Mono',monospace;
  font-size:9px;
  padding:5px 11px;
  border:1px solid var(--light);
  color:var(--mid);
  background:var(--bg);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
  letter-spacing:.03em;
  border-radius:2px;
}
.chip:hover{border-color:var(--black);color:var(--black)}
.chip.active{background:var(--black);color:var(--yellow);border-color:var(--black)}
.chip-all{font-weight:500}
.search-wrap{margin-left:auto;padding-left:16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-wrap input{font-family:'DM Mono',monospace;font-size:11px;border:1px solid var(--light);padding:5px 10px;outline:none;width:180px;color:var(--black);background:var(--bg);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--black)}
.search-wrap input::placeholder{color:var(--light)}
#count-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--mid);white-space:nowrap}

/* MAIN AREA */
.main{grid-column:1;grid-row:4;overflow-y:auto;padding:20px 24px}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--light)}

/* MONTH SECTIONS */
.month-section{margin-bottom:28px}
.month-header{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;position:sticky;top:-20px;background:var(--bg);padding:4px 0;z-index:2;border-bottom:1px solid var(--light)}
.month-name{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.month-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--mid)}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}

/* CONTEXT CARD */
.ctx-card{border:1px solid var(--light);padding:12px 14px;cursor:pointer;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:6px}
.ctx-card:hover{border-color:var(--black);background:#FAFAF8}
.ctx-card.selected{border-color:var(--black);border-width:1.5px;background:#FAFAF8}
.ctx-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--card-accent, var(--black))}
.card-type{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--mid)}
.card-name{font-size:13px;font-weight:500;line-height:1.3;color:var(--black)}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.card-terr{font-family:'DM Mono',monospace;font-size:8px;color:#fff;padding:2px 6px;border-radius:2px;background:var(--card-terr-color, var(--mid))}
.card-scope{font-family:'DM Mono',monospace;font-size:8px;color:var(--mid)}
.card-date{font-family:'DM Mono',monospace;font-size:8px;color:var(--mid)}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--light)}
.empty-state p{font-size:15px;font-style:italic}
.empty-state span{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em}

/* PANEL */
.panel{grid-column:2;grid-row:2/5;border-left:1px solid var(--black);display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative}
.panel-empty{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;height:100%;padding:28px 26px}
.pe-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--light);margin-bottom:10px}
.pe-text{font-size:15px;color:var(--light);font-style:italic;line-height:1.5;max-width:200px}

.panel-content{display:none;flex-direction:column;height:100%}
.panel-content.active{display:flex}

.ph{padding:18px 24px 14px;border-bottom:1px solid var(--light);flex-shrink:0;position:relative}
.ph-tag{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--mid);margin-bottom:6px}
.ph-name{font-size:17px;font-weight:700;letter-spacing:-0.02em;line-height:1.25;margin-bottom:10px}
.ph-badges{display:flex;flex-wrap:wrap;gap:6px}
.type-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;background:var(--black);color:var(--yellow);letter-spacing:.04em}
.scope-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border:1px solid var(--light);color:var(--mid)}
.close-btn{position:absolute;top:16px;right:20px;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:18px;color:var(--light);transition:color .15s;padding:0;line-height:1}
.close-btn:hover{color:var(--black)}

.panel-body{flex:1;overflow-y:auto;padding:0}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--light)}

.info-row{display:flex;align-items:baseline;justify-content:space-between;padding:11px 24px;border-bottom:1px solid var(--light)}
.info-row:last-child{border-bottom:none}
.ir-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);flex-shrink:0;margin-right:12px}
.ir-value{font-size:13px;color:var(--black);text-align:right;line-height:1.4}
.ir-link{color:var(--black);text-decoration:none;border-bottom:1px solid var(--light);transition:all .15s;padding-bottom:1px}
.ir-link:hover{color:var(--black);border-bottom-color:var(--black);background:var(--yellow);padding:0 3px}

.kw-section{padding:16px 24px;border-top:1px solid var(--light)}
.kw-section-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);margin-bottom:10px}
.kw-chips{display:flex;flex-wrap:wrap;gap:6px}
.kw-chip{font-family:'DM Mono',monospace;font-size:10px;padding:4px 9px;border:1px solid var(--light);color:var(--black);transition:all .12s;cursor:default}
.kw-chip:hover{border-color:var(--black);background:var(--black);color:var(--yellow)}

.link-row{border-top:1px solid var(--light);padding:12px 24px;flex-shrink:0}
.link-row a{font-family:'DM Mono',monospace;font-size:9px;color:var(--mid);text-decoration:none;letter-spacing:.05em;display:flex;align-items:center;gap:6px;transition:color .15s}
.link-row a:hover{color:var(--black)}
.link-row-map{background:var(--lighter)}
.link-row-map a{color:var(--black);font-weight:500}
.link-row-map a:hover{color:var(--black);text-decoration:underline}

.panel-nav{border-top:1px solid var(--light);display:flex;flex-shrink:0}
.nav-btn{flex:1;background:none;border:none;border-right:1px solid var(--light);font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);padding:12px 0;cursor:pointer;transition:all .15s}
.nav-btn:last-child{border-right:none}
.nav-btn:hover{background:var(--yellow);color:var(--black)}
.nav-page{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mid);text-decoration:none;padding:7px 14px;border:1px solid var(--light);transition:all .15s;white-space:nowrap;flex-shrink:0}
.nav-page:hover{border-color:var(--black);color:var(--black);background:var(--yellow)}
</style>
</head>

<div class="app">
  <header>
    <span class="logo">ℓiⱴε the agency</span>
    <div class="hc">
      <span class="ht">Culture Monitor</span>
      <span class="hs">Contextos Ativáveis 2026</span>
    </div>
    <div class="stats">
      <div class="stat"><span class="sn" id="stat-total">549</span><span class="sl">Contextos</span></div>

      <div class="stat"><span class="sn">12</span><span class="sl">Meses</span></div>

    <a class="nav-page" id="navToMindmap" href="culture_monitor_mindmap.html">← Mapa de Territórios</a>

  <!-- Territory bar — 2-row grid, all 16 visible -->
  <div class="terr-bar">
    <span class="terr-bar-label">Território</span>
    <div class="terr-grid" id="chips-terr"></div>
  </div>

  <!-- Secondary filters: escopo + search -->
  <div class="filters">
    <div class="filter-group">
      <span class="fg-label">Escopo</span>
      <div class="filter-chips" id="chips-scope"></div>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="buscar contexto...">
      <span id="count-label"></span>
    </div>
  </div>

  <main class="main" id="main"></main>

  <aside class="panel">
    <div class="panel-empty" id="panelEmpty">
      <div class="pe-label">Nenhum selecionado</div>
      <div class="pe-text">Selecione um contexto para ver todos os detalhes.</div>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="ph">
        <div class="ph-tag" id="pTag"></div>
        <div class="ph-name" id="pName"></div>
        <div class="ph-badges" id="pBadges"></div>
        <button class="close-btn" id="closePanel">×</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
      <div class="panel-nav">
        <button class="nav-btn" id="navPrev">← anterior</button>
        <button class="nav-btn" id="navNext">próximo →</button>
      </div>
    </div>
  </aside>
</div>

    const color = TERR_COLORS[t];
    const el = document.createElement('button');
    el.className = 'tchip' + (isActive ? ' tactive' : '');
    el.textContent = TERR_SHORT[t];
    el.title = t;
    if (isActive) {
      el.style.background = color;
      el.style.color = '#fff';
    } else {
      el.addEventListener('mouseenter', () => {
        el.style.background = color + '18';
        el.style.color = color;
      });
      el.addEventListener('mouseleave', () => {
        el.style.background = '';
        el.style.color = '';
      });
    }
    el.addEventListener('click', () => {
      activeTerritory = activeTerritory === t ? 'all' : t;
      render();
      buildChips();
      updateMapLink();
    });
    terrEl.appendChild(el);
  });

  // — Scope chips —
  const scopes = ['all', 'Global', 'Nacional', 'Regional', 'Brasil'];
  const scopeEl = document.getElementById('chips-scope');
  scopeEl.innerHTML = '';
  scopes.forEach(s => {
    const el = document.createElement('button');
    el.className = 'chip' + (s === activeScope ? ' active' : '');
    el.textContent = s === 'all' ? 'Todos' : s;
    el.addEventListener('click', () => { activeScope = s; render(); buildChips(); });
    scopeEl.appendChild(el);
  });
}

// ── Filter ──
function filterContexts() {
  return RAW.filter(c => {
    if (activeTerritory !== 'all' && c.territory !== activeTerritory) return false;
    if (activeScope !== 'all') {
      const sc = (c.scope || '').toLowerCase();
      const target = activeScope.toLowerCase();
      if (!sc.includes(target) && sc !== target) return false;
    }
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !c.territory.toLowerCase().includes(q) && !(c.topic || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// ── Group by month ──
function groupByMonth(contexts) {
  const groups = {};
  contexts.forEach((c, fi) => {
    const m = c.month || 0;
    if (!groups[m]) groups[m] = [];
    groups[m].push({ ctx: c, fi });
  });
  return groups;
}

// ── Render main grid ──
function render() {
  filteredContexts = filterContexts();
  document.getElementById('count-label').textContent = filteredContexts.length + ' resultados';
  document.getElementById('stat-total').textContent = filteredContexts.length;

  const main = document.getElementById('main');
  main.innerHTML = '';

  if (filteredContexts.length === 0) {
    main.innerHTML = `<div class="empty-state"><span>Nenhum resultado</span><p>Tente ajustar os filtros ou a busca.</p></div>`;
    return;
  }

  const groups = groupByMonth(filteredContexts);
  const sortedMonths = Object.keys(groups).map(Number).sort((a, b) => {
    if (a === 0) return 1; if (b === 0) return -1; return a - b;
  });

  sortedMonths.forEach(m => {
    const section = document.createElement('div');
    section.className = 'month-section';

    const header = document.createElement('div');
    header.className = 'month-header';
    header.innerHTML = `
      <span class="month-name">${m ? MONTH_FULL[m] : 'Sem data definida'}</span>
      <span class="month-count">${groups[m].length} contexto${groups[m].length !== 1 ? 's' : ''}</span>`;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    groups[m].forEach(({ ctx: c, fi }) => {
      const card = document.createElement('div');
      card.className = 'ctx-card' + (selectedIdx === fi ? ' selected' : '');
      card.dataset.fi = fi;
      const tcolor = TERR_COLORS[c.territory] || 'var(--mid)';
      card.style.setProperty('--card-terr-color', tcolor);
      card.style.setProperty('--card-accent', tcolor);

      const dateStr = c.start && c.start !== 'nan'
        ? (c.end && c.end !== 'nan' && c.end !== c.start ? c.start + ' – ' + c.end : c.start)
        : '';

      card.innerHTML = `
        <div class="card-type">${TYPE_LABEL[c.type] || c.type}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          <span class="card-terr">${TERR_SHORT[c.territory] || c.territory}</span>
          ${c.scope ? `<span class="card-scope">${c.scope}</span>` : ''}
          ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
        </div>`;

      card.addEventListener('click', () => openPanel(fi));
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

// ── Panel ──
function openPanel(fi) {
  selectedIdx = fi;
  const c = filteredContexts[fi];

  document.getElementById('panelEmpty').style.display = 'none';
  document.getElementById('panelContent').classList.add('active');

  document.getElementById('pTag').innerHTML =
    `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TERR_COLORS[c.territory]||'var(--mid)'};margin-right:6px;vertical-align:middle"></span>` +
    (TERR_SHORT[c.territory] || c.territory) + (c.topic ? ' · ' + c.topic : '');

  document.getElementById('pName').textContent = c.name;

  document.getElementById('pBadges').innerHTML = `
    <span class="type-badge">${TYPE_LABEL[c.type] || c.type}</span>
    ${c.scope ? `<span class="scope-badge">${c.scope}</span>` : ''}
    ${c.period ? `<span class="scope-badge">${c.period}</span>` : ''}`;

  const terrLink = c.territory
    ? `<a class="ir-link" href="culture_monitor_mindmap.html#${encodeURIComponent(c.territory)}" title="Ver no mapa de territórios">${c.territory} ↗</a>`
    : '';

  const rows = [];
  if (c.start) rows.push(['Início', c.start]);
  if (c.end && c.end !== 'nan') rows.push(['Fim', c.end]);
  if (c.territory) rows.push(['Território', terrLink]);
  if (c.topic) rows.push(['Tópico', c.topic]);
  if (c.scope) rows.push(['Escopo', c.scope]);
  if (c.period) rows.push(['Periodicidade', c.period]);

  const bodyHTML = rows.map(([l, v]) =>
    `<div class="info-row"><span class="ir-label">${l}</span><span class="ir-value">${v}</span></div>`
  ).join('');

  const kwHTML = c.kws && c.kws.length
    ? `<div class="kw-section">
        <div class="kw-section-label">Palavras-chave</div>
        <div class="kw-chips">${c.kws.map(k => `<span class="kw-chip">${k}</span>`).join('')}</div>
       </div>` : '';

  const linkHTML = (c.link && c.link !== 'nan'
    ? `<div class="link-row"><a href="${c.link}" target="_blank" rel="noopener">${c.link.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]}</a></div>` : '')
    + (c.territory
    ? `<div class="link-row link-row-map"><a href="culture_monitor_mindmap.html#${encodeURIComponent(c.territory)}">Ver território no mapa de tópicos ↗</a></div>`
    : '');

  document.getElementById('panelBody').innerHTML = bodyHTML + kwHTML + linkHTML;
  document.getElementById('panelBody').scrollTop = 0;

  // Highlight selected card
  document.querySelectorAll('.ctx-card').forEach(el => {
    el.classList.toggle('selected', +el.dataset.fi === fi);
  });
}

function closePanel() {
  selectedIdx = null;
  document.getElementById('panelContent').classList.remove('active');
  document.getElementById('panelEmpty').style.display = '';
  document.querySelectorAll('.ctx-card.selected').forEach(el => el.classList.remove('selected'));
}

document.getElementById('closePanel').addEventListener('click', closePanel);
document.getElementById('navPrev').addEventListener('click', () => {
  if (selectedIdx !== null && selectedIdx > 0) openPanel(selectedIdx - 1);
});
document.getElementById('navNext').addEventListener('click', () => {
  if (selectedIdx !== null && selectedIdx < filteredContexts.length - 1) openPanel(selectedIdx + 1);
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if (e.key === 'ArrowDown' && selectedIdx !== null) openPanel(Math.min(selectedIdx + 1, filteredContexts.length - 1));
  if (e.key === 'ArrowUp' && selectedIdx !== null) openPanel(Math.max(selectedIdx - 1, 0));
});

// ── Keep nav link in sync with active territory ──
function updateMapLink() {
  const a = document.getElementById('navToMindmap');
  if (!a) return;
  if (activeTerritory !== 'all') {
    a.href = `culture_monitor_mindmap.html#${encodeURIComponent(activeTerritory)}`;
    a.title = `Ver ${TERR_SHORT[activeTerritory] || activeTerritory} no mapa`;
  } else {
    a.href = 'culture_monitor_mindmap.html';
    a.title = '';
  }
}

// ── Init ──
// Read hash from URL: #terr-Esportes → pre-filter that territory
(function() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash.startsWith('terr-')) {
    const terrName = hash.slice(5);
    if (Object.keys(TERR_SHORT).includes(terrName)) {
      activeTerritory = terrName;
    }
  }
})();
buildChips();
render();
updateMapLink();
</script>
</body>
</html>
